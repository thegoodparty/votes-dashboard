name: Sync VOTES metrics from Drive

on:
  schedule:
    # Mondays at 18:00 UTC (11am Pacific, after Cowork's Monday run).
    # Adjust in both places if cadence changes: here AND in weekly-votes-prompt.md's schedule.
    - cron: '0 18 * * 1'
  workflow_dispatch:

permissions:
  contents: write  # needed to commit data.json back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Pull data from Drive
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: python scripts/sync.py

      - name: Commit if changed
        run: |
          if git diff --quiet data.json; then
            echo "No changes to data.json."
            exit 0
          fi
          git config user.name "votes-dashboard-sync[bot]"
          git config user.email "votes-dashboard-sync@users.noreply.github.com"
          git add data.json
          git commit -m "chore(data): sync VOTES metrics $(date -u +%Y-%m-%d)"
          git push
