name: Deploy dashboard to Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'data.json'
      - 'metrics-config.json'
      - '.github/workflows/pages.yml'
  workflow_run:
    workflows: ["Sync VOTES metrics from Drive"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Skip if triggered by a sync workflow that didn't succeed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # When triggered via workflow_run, the default ref is the workflow file's ref,
          # not the commit the sync workflow produced. Explicitly check out main to get
          # the freshly-committed data.json.
          ref: main

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r src/* _site/
          cp data.json _site/
          cp metrics-config.json _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
